<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YYG TEAM</title>
    <style>
        /* Cấu hình nền xám tối và trắng chủ đạo */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #111111; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; overflow: hidden; position: relative; }

        /* HIỆU ỨNG ÁNH SÁNG THEO CHUỘT */
        .mouse-glow { position: fixed; top: 0; left: 0; width: 600px; height: 600px; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 50%, rgba(0,0,0,0) 80%); border-radius: 50%; pointer-events: none; transform: translate(-50%, -50%); z-index: 1; mix-blend-mode: screen; transition: opacity 0.3s ease; opacity: 0; }

        /* KHU VỰC LOGO & TÊN TEAM */
        .brand-header { display: flex; flex-direction: column; align-items: center; margin-bottom: 40px; position: relative; z-index: 2; }
        .team-logo { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 3px solid #333333; box-shadow: 0 0 20px rgba(255,255,255,0.1); margin-bottom: 15px; transition: all 0.5s ease; }
        .brand-header:hover .team-logo { border-color: #ffffff; transform: scale(1.05); box-shadow: 0 0 25px rgba(255,255,255,0.2); }
        .brand-title { font-size: 4.5rem; font-weight: 900; color: #ffffff; letter-spacing: 5px; text-shadow: 0 0 15px rgba(255,255,255,0.3); text-align: center; line-height: 1; }

        /* Vùng chứa 4 ô vuông lớn */
        .team-container { display: flex; width: 100%; max-width: 1400px; gap: 25px; height: 600px; align-items: center; justify-content: center; position: relative; z-index: 2; }

        /* Cấu hình từng ô vuông thành viên tone Xám - Trắng */
        .member-box { position: relative; flex: 1; height: 100%; border-radius: 20px; overflow: hidden; border: 2px solid #333333; cursor: pointer; transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); background-color: #1a1a1a; box-shadow: 0 15px 35px rgba(0,0,0,0.5); }
        .member-box img { width: 100%; height: 100%; object-fit: cover; transition: all 0.6s ease; filter: brightness(0.4) grayscale(100%); }

        /* Phần chữ thông tin ban đầu ẩn đi */
        .member-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 35px; background: linear-gradient(to top, rgba(17,17,17,1) 0%, rgba(17,17,17,0.8) 60%, rgba(17,17,17,0) 100%); text-align: left; opacity: 0; transform: translateY(30px); transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); }
        .member-name { font-size: 1.8rem; font-weight: bold; color: #ffffff; margin-bottom: 4px; }
        .member-role { font-size: 1rem; color: #cccccc; font-weight: 500; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 15px; }

        /* Nút Đăng ký YouTube màu đỏ nổi bật */
        .btn-youtube { display: inline-flex; align-items: center; justify-content: center; background-color: #ff0000; color: #ffffff; padding: 10px 20px; font-size: 0.9rem; font-weight: bold; text-decoration: none; border-radius: 25px; border: none; transition: background 0.3s, transform 0.2s; box-shadow: 0 4px 10px rgba(255,0,0,0.3); pointer-events: auto; }
        .btn-youtube:hover { background-color: #cc0000; transform: scale(1.05); }

        /* HIỆU ỨNG TƯƠNG TÁC KHI DI CHUỘT (HOVER EFFECT) */
        .team-container:hover .member-box { flex: 0.6; border-color: #222222; }
        .team-container:hover .member-box img { filter: brightness(0.15) grayscale(100%) blur(3px); }

        .team-container .member-box:hover { flex: 2.5; border-color: #ffffff; box-shadow: 0 0 40px rgba(255,255,255,0.15); }
        .team-container .member-box:hover img { transform: scale(1.08); filter: brightness(1) grayscale(0%); }
        .team-container .member-box:hover .member-info { opacity: 1; transform: translateY(0); }

        /* Tối ưu giao diện trên điện thoại (Xếp dọc, ẩn ánh sáng chuột) */
        @media (max-width: 900px) {
            .mouse-glow { display: none; }
            body { overflow-y: auto; }
            .brand-title { font-size: 3.5rem; }
            .team-logo { width: 90px; height: 90px; }
            .team-container { flex-direction: column; height: auto; gap: 20px; }
            .member-box { width: 100%; height: 350px; flex: none !important; }
            .member-box img { filter: brightness(0.8) grayscale(0%) !important; }
            .member-info { opacity: 1; transform: translateY(0); padding: 20px; background: linear-gradient(to top, rgba(17,17,17,1) 0%, rgba(17,17,17,0.6) 100%); }
            .member-name { font-size: 1.4rem; }
            .member-role { font-size: 0.9rem; }
        }
                /* ĐỊNH DẠNG THANH WIDGET NHẠC DYNAMIC APPLE STYLE */
        .music-widget { position: fixed; bottom: 25px; left: 25px; z-index: 1000; background: rgba(30, 30, 30, 0.75); border: 1px solid rgba(255, 255, 255, 0.1); padding: 12px 20px; border-radius: 20px; display: flex; align-items: center; gap: 15px; width: 420px; backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); transform: translateX(-120%); opacity: 0; transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); }
        .music-widget.show { transform: translateX(0); opacity: 1; }
        
        /* Ảnh thumb bài hát bo góc */
        .widget-thumb { width: 50px; height: 50px; border-radius: 10px; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        /* Phần thông tin và thanh thời gian */
        .widget-info { flex: 1; display: flex; flex-direction: column; text-align: left; }
        .widget-song-title { font-size: 0.95rem; font-weight: 600; color: #ffffff; }
        .widget-artist { font-size: 0.8rem; color: #aaaaaa; margin-bottom: 5px; }
        
        /* Thanh tiến trình thời gian chạy nhạc */
        .widget-time-bar { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: #888888; font-family: monospace; }
        .progress-container { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; cursor: pointer; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: #ffffff; border-radius: 2px; transition: width 0.1s linear; }
        
        /* Hệ thống nút bấm điều khiển */
        .widget-controls { display: flex; align-items: center; gap: 12px; }
        .control-btn { background: none; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 4px; }
        .control-btn svg { width: 16px; height: 16px; fill: #aaaaaa; transition: fill 0.2s; }
        .control-btn:hover svg { fill: #ffffff; }
        .play-btn svg { width: 22px; height: 22px; fill: #ffffff; }
    </style>
</head>
<body>

    <!-- ĐÈN SÁNG THEO CON CHUỘT -->
    <div class="mouse-glow" id="glow"></div>

    <!-- KHU VỰC LOGO VÀ TÊN TEAM ĐẦU TRANG -->
    <div class="brand-header">
        <!-- Thay link logo của bạn vào src dưới đây -->
        <img class="team-logo" src="https://i.postimg.cc/SK4spTVv/yetyetgang.png" alt="YYG Logo">
        <div class="brand-title">YYG</div>
    </div>

    <!-- KHU VỰC 4 Ô VUÔNG THÀNH VIÊN -->
    <div class="team-container">

        <!-- THÀNH VIÊN 1 -->
        <div class="member-box">
            <!-- Thay ảnh thành viên 1 vào src dưới đây -->
            <img src="https://i.postimg.cc/Y0QF3GS0/thienan0212.png" alt="Thành viên 1">
            <div class="member-info">
                <div class="member-name">thienan0212</div>
                <div class="member-role">Content Creator</div>
                <!-- Thay link kênh YouTube vào href dưới đây -->
                <a href="https://youtube.com/@thienan0212?si=YP1EvEctAU2vRQge" target="_blank" class="btn-youtube">SUBSCRIBE KÊNH</a>
            </div>
        </div>

        <!-- THÀNH VIÊN 2 -->
        <div class="member-box">
            <img src="https://i.postimg.cc/KYVm805v/ndkn.jpg" alt="Thành viên 2">
            <div class="member-info">
                <div class="member-name">NDKN</div>
                <div class="member-role">Streamer</div>
                <a href="https://youtube.com/@yyg_ndkn?si=kZ1hCBzoJKemGVaW" target="_blank" class="btn-youtube">SUBSCRIBE KÊNH</a>
            </div>
        </div>

        <!-- THÀNH VIÊN 3 -->
        <div class="member-box">
            <img src="https://i.postimg.cc/DfPRCCbF/channels4-profile.jpg" alt="Thành viên 3">
            <div class="member-info">
                <div class="member-name">2fr</div>
                <div class="member-role">Streamer</div>
                <a href="https://youtube.com/@yyg_2fr?si=cc7gMNstVGU8tBjb" target="_blank" class="btn-youtube">SUBSCRIBE KÊNH</a>
            </div>
        </div>

        <!-- THÀNH VIÊN 4 -->
        <div class="member-box">
            <img src="https://picsum.photos" alt="Thành viên 4">
            <div class="member-info">
                <div class="member-name">Thành Viên 4</div>
                <div class="member-role">STREAMER</div>
                <a href="https://youtube.com" target="_blank" class="btn-youtube">SUBSCRIBE KÊNH</a>
            </div>
        </div>

    </div>

    <!-- SCRIPT ĐIỀU KHIỂN ÁNH SÁNG THEO CHUỘT -->
    <script>
        const glow = document.getElementById('glow');
        window.addEventListener('mousemove', (e) => {
            glow.style.opacity = '1';
            glow.style.left = e.clientX + 'px';
            glow.style.top = e.clientY + 'px';
        });
        window.addEventListener('mouseout', () => {
            glow.style.opacity = '0';
        });
    </script>

    <!-- GIAO DIỆN THANH NHẠC DYNAMIC MUSIC WIDGET MỚI -->
    <div class="music-widget" id="musicPlayer">
        <!-- Ảnh thu nhỏ bài hát (đang lấy ảnh Minecraft xám của bạn) -->
        <img class="widget-thumb" src="https://postimg.cc" alt="Thumb">
        
        <!-- Thông tin bài hát -->
        <div class="widget-info">
            <div class="widget-song-title">Tek It</div>
            <div class="widget-artist">Cafuné</div>
            <div class="widget-time-bar">
                <span id="currentTime">0:00</span>
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <span id="durationTime">3:11</span>
            </div>
        </div>

        <!-- Các nút điều khiển phát nhạc -->
        <div class="widget-controls">
            <button class="control-btn" id="prevBtn" title="Bài trước">
                <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
            </button>
            <button class="control-btn play-btn" id="playBtn" title="Phát/Tạm dừng">
                <!-- Icon Play mặc định -->
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <!-- Icon Pause ẩn lúc đầu -->
                <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </button>
            <button class="control-btn" id="nextBtn" title="Bài tiếp theo">
                <svg viewBox="0 0 24 24"><path d="M16 18h2V6h-2zM6 18l8.5-6L6 6z"/></svg>
            </button>
        </div>

        <!-- Thẻ âm thanh chạy ngầm đã ẩn giao diện thô -->
        <audio id="bg-music" src="https://files.catbox.moe/ma9n56.mp3" loop></audio>
    </div>

    <!-- GỌI FILE ĐIỀU KHIỂN NHẠC RIÊNG BIỆT -->
    <script src="music.js"></script>


</body>
</html>
