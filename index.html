<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YYG TEAM</title>
    <style>
        /* Cấu hình nền tối chung */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #0d0d13; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; overflow-x: hidden; }

        /* Tên YYG ở trên đầu */
        .brand-title { font-size: 5rem; font-weight: 900; color: #66fcf1; letter-spacing: 5px; margin-bottom: 40px; text-shadow: 0 0 20px rgba(102,252,241,0.6); text-align: center; }

        /* Vùng chứa 4 ô vuông thành viên */
        .team-container { display: flex; width: 100%; max-width: 1200px; gap: 20px; height: 450px; align-items: center; justify-content: center; }

        /* Cấu hình từng ô vuông thành viên */
        .member-box { position: relative; flex: 1; height: 100%; border-radius: 15px; overflow: hidden; border: 2px solid #1f2833; cursor: pointer; transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1); background-color: #1a1a24; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Hình ảnh bên trong ô vuông */
        .member-box img { width: 100%; height: 100%; object-fit: cover; transition: all 0.5s ease; filter: brightness(0.7); }

        /* Phần chữ thông tin (Tên + Vai trò) đè lên ảnh */
        .member-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 25px; background: linear-gradient(to top, rgba(13,13,19,1) 0%, rgba(13,13,19,0.7) 50%, rgba(13,13,19,0) 100%); text-align: left; transition: all 0.5s ease; }
        .member-name { font-size: 1.5rem; font-weight: bold; color: #ffffff; margin-bottom: 5px; }
        .member-role { font-size: 1rem; color: #66fcf1; font-weight: 500; letter-spacing: 1px; }

        /* HIỆU ỨNG TƯƠNG TÁC KHI DI CHUỘT (HOVER EFFECT) */
        /* Khi di chuột vào vùng chứa chung, tất cả các ô tự động thu nhỏ lại một chút */
        .team-container:hover .member-box { flex: 0.7; border-color: #1f2833; }
        .team-container:hover .member-box img { filter: brightness(0.4) blur(2px); }

        /* Riêng ô nào được trỏ chuột vào trực tiếp sẽ phóng to ra cực đại */
        .team-container .member-box:hover { flex: 2; border-color: #66fcf1; box-shadow: 0 0 30px rgba(102,252,241,0.4); }
        .team-container .member-box:hover img { transform: scale(1.05); filter: brightness(1); }
        .team-container .member-box:hover .member-info { background: linear-gradient(to top, rgba(13,13,19,1) 0%, rgba(13,13,19,0.5) 100%); }

        /* Tối ưu giao diện mượt mà trên điện thoại (Xếp dọc thay vì xếp ngang) */
        @media (max-width: 768px) {
            .brand-title { font-size: 3.5rem; margin-bottom: 20px; }
            .team-container { flex-direction: column; height: auto; gap: 15px; }
            .member-box { width: 100%; height: 250px; flex: none !important; }
            .member-box img { filter: brightness(0.9) !important; }
        }
    </style>
</head>
<body>

    <!-- TÊN YYG TRÊN ĐẦU -->
    <div class="brand-title">YYG</div>

    <!-- KHU VỰC 4 Ô VUÔNG THÀNH VIÊN -->
    <div class="team-container">

        <!-- THÀNH VIÊN 1 -->
        <div class="member-box">
            <!-- Thay link ảnh của Thành viên 1 vào mục src bên dưới -->
            <img src="https://picsum.photos" alt="Thành viên 1">
            <div class="member-info">
                <div class="member-name">Thiên An</div>
                <div class="member-role">LEADER / CREATOR</div>
            </div>
        </div>

        <!-- THÀNH VIÊN 2 -->
        <div class="member-box">
            <!-- Thay link ảnh của Thành viên 2 vào mục src bên dưới -->
            <img src="https://picsum.photos" alt="Thành viên 2">
            <div class="member-info">
                <div class="member-name">Thành Viên 2</div>
                <div class="member-role">VIDEO EDITOR</div>
            </div>
        </div>

        <!-- THÀNH VIÊN 3 -->
        <div class="member-box">
            <!-- Thay link ảnh của Thành viên 3 vào mục src bên dưới -->
            <img src="https://picsum.photos" alt="Thành viên 3">
            <div class="member-info">
                <div class="member-name">Thành Viên 3</div>
                <div class="member-role">DESIGNER</div>
            </div>
        </div>

        <!-- THÀNH VIÊN 4 -->
        <div class="member-box">
            <!-- Thay link ảnh của Thành viên 4 vào mục src bên dưới -->
            <img src="https://picsum.photos" alt="Thành viên 4">
            <div class="member-info">
                <div class="member-name">Thành Viên 4</div>
                <div class="member-role">STREAMER</div>
            </div>
        </div>

    </div>

</body>
</html>
